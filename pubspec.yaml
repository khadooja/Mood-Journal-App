name: mindtrack
description: "MindTrack – A clean mood journaling app. Portfolio project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1        # Clean typography (Inter font)
  gap: ^3.0.1                 # Readable spacing widget
  hive_flutter: ^1.1.0        # Local NoSQL database for journal entries
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  http: ^1.2.2                 # HTTP client for OpenAI API calls
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1      # Generates Hive TypeAdapters from annotations
  build_runner: ^2.4.0        # Required to run code generation

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
